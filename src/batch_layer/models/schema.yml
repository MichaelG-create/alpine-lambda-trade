version: 2

models:
  - name: slv_trades
    description: "Cleansed and deduplicated trades data"
    columns:
      - name: trade_id
        description: "Unique identifier for the trade"
        tests:
          - unique
          - not_null
      - name: symbol
        description: "Trading pair symbol"
        tests:
          - not_null
      - name: price
        description: "Execution price"
        tests:
          - not_null
      - name: trade_timestamp
        description: "Exact time the trade occurred"
        tests:
          - not_null
